services:
  # Servicio: Base de datos MariaDB
  db:
    image: mariadb:10.11
    container_name: app_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ikasle123
      MYSQL_DATABASE: staging_db
      MYSQL_USER: staging
      MYSQL_PASSWORD: ikasle123
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "staging", "-pikasle123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Servicio: Aplicación Laravel (app + webserver Nginx)
  app:
    build:
      context: ./E2T1_Ileapaindegi_Backend
      dockerfile: docker/staging/Dockerfile
    container_name: app_laravel
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_NAME: IleapaindegiApp
      APP_ENV: staging
      APP_KEY: base64:POOuzPdCWvcIL7g2/yKi8oUKkDxpTng42cUm7yelcPc=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: staging_db
      DB_USERNAME: staging
      DB_PASSWORD: ikasle123
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/var/www/storage/app/public

  # Servicio: Frontend Vue.js (webserver estático)
  webserver:
    build:
      context: ./E2T1_Ileapandegi_Frontend
      dockerfile: docker/staging/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    container_name: app_vue
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - app_network
    ports:
      - "5173:80"

volumes:
  db_data:
  storage_data:

networks:
  app_network:
    driver: bridge
